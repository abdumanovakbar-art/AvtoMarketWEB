{% extends "base.html" %}

{% block title %}Profil — AutoMarket{% endblock %}

{% block content %}
    <div class="form-box narrow">
        <h1>Profil</h1>
        <p class="profile-username">{{ user.username }} · {{ user.email }}</p>
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="{{ form.phone.id_for_label }}">Telefon raqam</label>
                {{ form.phone }}
            </div>
            <div class="form-group">
                <label for="{{ form.city.id_for_label }}">Shahar</label>
                {{ form.city }}
            </div>
            <button type="submit" class="btn btn-primary btn-block">Saqlash</button>
        </form>
    </div>
{% endblock %}
