{% extends "base.html" %}

{% block title %}E'lon berish — AutoMarket{% endblock %}

{% block content %}
    <div class="form-box">
        <h1>Yangi e'lon berish</h1>
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="{{ form.model.id_for_label }}">Model</label>
                {{ form.model }}
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="{{ form.year.id_for_label }}">Ishlab chiqarilgan yili</label>
                    {{ form.year }}
                </div>
                <div class="form-group">
                    <label for="{{ form.mileage.id_for_label }}">Yurgan masofasi (km)</label>
                    {{ form.mileage }}
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="{{ form.price.id_for_label }}">Narxi (so'm)</label>
                    {{ form.price }}
                </div>
                <div class="form-group">
                    <label for="{{ form.city.id_for_label }}">Shahar</label>
                    {{ form.city }}
                </div>
            </div>
            <div class="form-group">
                <label for="{{ form.description.id_for_label }}">Tavsif</label>
                {{ form.description }}
            </div>
            <button type="submit" class="btn btn-primary">E'lonni joylash</button>
        </form>
    </div>
{% endblock %}
